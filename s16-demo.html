<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>S16 Demo</title>
	<style>
		h1 {
			color: green;
		}

		.note {
			background: #b9eac0;
			padding: 10px;
			margin-top: 10px;
			border: 1px solid #c9fcc4;
		}
	</style>
</head>
<body>
	<h1>S16 Demo</h1>
	<button id="postBtn" type="button">Click me</button>
	<textarea id="message"></textarea>
	<p>Characters: <span id="count">0</span></p>
	<div id="notes"></div>

	<script>
		const heading = document.querySelector('h1');
		const textarea = document.querySelector('#message');
		const counter = document.querySelector('#count');
		const postBtn = document.querySelector('#postBtn');
		const notes = document.querySelector('#notes');
		let isLightGreen = false;

		textarea.addEventListener('input', function() {
			console.log('input changed');
			counter.textContent = textarea.value.length;
		});

		postBtn.addEventListener('click', function() {
			heading.style.color = isLightGreen ? 'green' : 'lightgreen';
			isLightGreen = !isLightGreen;

			if (!textarea.value.trim()) return;

			const note = document.createElement('div');
			note.className = 'note';
			note.textContent = textarea.value;
			notes.appendChild(note);

			textarea.value = '';
			counter.textContent = '0';
		});
	</script>
</body>
</html>
